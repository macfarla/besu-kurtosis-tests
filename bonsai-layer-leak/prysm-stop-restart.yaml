# Kurtosis config for verifying the PR #10600 fix via a real Prysm stop/restart.
#
# Unlike network_params.yaml (which uses the FCU-dropping proxy), this approach
# uses a live Prysm node. Stopping and restarting Prysm causes it to reconnect
# and fire a burst of engine_newPayloadV4 calls without intervening FCU, which
# is the exact scenario reported in issue #10498.
#
# Replace el_image on the Besu+Prysm participant with the image under test.
#
# Run:
#   kurtosis loki start
#   kurtosis run github.com/ethpandaops/ethereum-package@6.1.0 \
#     --enclave prysm-stall-test \
#     --args-file prysm-stop-restart.yaml \
#     --image-download always
#
# Trigger procedure (after ~5 min when finality is reached):
#   ENCLAVE=prysm-stall-test
#   kurtosis service stop $ENCLAVE cl-2-prysm-besu
#   sleep 180   # let the network run ~30 slots ahead
#   kurtosis service start $ENCLAVE cl-2-prysm-besu
#   kurtosis service logs $ENCLAVE el-2-besu-prysm --follow
#
# What to look for:
#
#   Unpatched (bug present):
#     - Burst of "Imported #N" lines with no FCU between them
#     - No SYNCING responses
#     - Layer count climbs; isClosed() may dominate CPU on longer runs
#
#   Patched (PR #10600 fix):
#     - First block after reconnect: "Imported #N" (parent in cache)
#     - Subsequent blocks: "Parent world state not immediately cached ... returning SYNCING"
#     - BackwardSyncContext starts, rebuilds the gap
#     - Normal "Imported #N" / FCU(VALID) resumes within ~2 min

participants:
  # Supernode (Geth + Lighthouse) — drives the chain
  - el_type: geth
    cl_type: lighthouse
    cl_image: "sigp/lighthouse:v8.1.3"
    supernode: true
    count: 1

  # TARGET: Besu + Prysm — replace el_image with the image under test
  - el_type: besu
    el_image: "hyperledger/besu:develop"
    el_log_level: "debug"
    el_extra_env_vars:
      BESU_OPTS: "-Xmx2g"
    cl_type: prysm
    cl_image: "gcr.io/prysmaticlabs/prysm/beacon-chain:v7.1.4"
    vc_image: "gcr.io/prysmaticlabs/prysm/validator:v7.1.4"
    use_separate_vc: true
    count: 1
    cl_extra_params: ["--min-sync-peers=1"]

  # CC-control: Besu + Lighthouse — same image, different CL (should stay flat)
  - el_type: besu
    el_image: "hyperledger/besu:develop"
    el_log_level: "debug"
    el_extra_env_vars:
      BESU_OPTS: "-Xmx2g"
    cl_type: lighthouse
    cl_image: "sigp/lighthouse:v8.1.3"
    count: 1

  # EL-control: Geth + Prysm — confirms Prysm itself is healthy
  - el_type: geth
    cl_type: prysm
    cl_image: "gcr.io/prysmaticlabs/prysm/beacon-chain:v7.1.4"
    vc_image: "gcr.io/prysmaticlabs/prysm/validator:v7.1.4"
    use_separate_vc: true
    count: 1

network_params:
  network_id: "3151908"
  network: "kurtosis"
  preset: "mainnet"
  seconds_per_slot: 6
  num_validator_keys_per_node: 64
  deneb_fork_epoch: 0
  electra_fork_epoch: 0
  fulu_fork_epoch: 0

additional_services:
  - tx_fuzz
  - prometheus_grafana
